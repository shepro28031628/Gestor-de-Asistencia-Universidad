{% extends "layout.html" %}

{% block title %}Bienvenidos - UNINPAHU Asistencia{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto animate-in fade-in duration-1000">
    <!-- Logo y Cabecera -->
    <div class="text-center mb-12">
        <div class="relative inline-block mb-6">
            <div class="w-32 h-24 bg-white rounded-3xl shadow-2xl flex items-center justify-center p-2 transform -rotate-6 hover:rotate-0 transition-transform duration-500 border border-slate-100 overflow-hidden">
                <img src="/static/qrs/LOGO.png" alt="UNINPAHU Logo" class="w-full h-full object-contain">
            </div>
            <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-accent rounded-2xl shadow-lg flex items-center justify-center text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
        </div>
        <h1 class="text-4xl font-black text-uninpahu tracking-tighter uppercase leading-none">Asistencia</h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em] mt-2">Plataforma Académica</p>
    </div>

    <!-- Formulario de Login -->
    <div class="glass w-full p-10 rounded-[3rem] shadow-2xl border-white/50 backdrop-blur-xl space-y-6">
        <div class="flex p-1 bg-slate-100 rounded-2xl mb-8">
            <button onclick="setRole('estudiante')" id="btn-estudiante" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-uninpahu transition-all">Estudiante</button>
            <button onclick="setRole('profesor')" id="btn-profesor" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-slate-400 hover:text-uninpahu transition-all">Docente</button>
        </div>

        <div class="space-y-4">
            <div class="relative group">
                <label class="block text-[10px] font-black text-uninpahu uppercase tracking-widest mb-2 ml-1">Usuario Institucional</label>
                <input type="text" id="username" placeholder="Ej: 10102030" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold text-slate-700 focus:border-accent focus:bg-white transition-all outline-none">
            </div>

            <div class="relative group">
                <label class="block text-[10px] font-black text-uninpahu uppercase tracking-widest mb-2 ml-1">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold text-slate-700 focus:border-accent focus:bg-white transition-all outline-none">
            </div>
        </div>

        <button onclick="handleLogin()" id="login-btn" class="w-full btn-uninpahu-navy py-5 text-sm shadow-xl shadow-blue-100 group">
            <span class="flex items-center justify-center gap-2 group-hover:gap-4 transition-all">
                Ingresar al Portal
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </span>
        </button>

        <div class="text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">© 2024 Fundación Universitaria para el Desarrollo Humano</p>
        </div>
    </div>
</div>

<script>
    let currentRole = 'estudiante';

    function setRole(role) {
        currentRole = role;
        const btnEst = document.getElementById('btn-estudiante');
        const btnProf = document.getElementById('btn-profesor');
        
        if (role === 'estudiante') {
            btnEst.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-uninpahu transition-all";
            btnProf.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-slate-400 hover:text-uninpahu transition-all";
        } else {
            btnProf.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-uninpahu transition-all";
            btnEst.className = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-slate-400 hover:text-uninpahu transition-all";
        }
    }

    async function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');

        if(!user || !pass) {
            showToast("Completa tus credenciales", "warning");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = "Validando...";

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass, role: currentRole })
            });
            const data = await response.json();
            if (data.success) {
                showToast("¡Bienvenido!", "success");
                setTimeout(() => window.location.href = `/${currentRole}`, 800);
            } else {
                showToast(data.error, "error");
                btn.disabled = false;
                btn.innerHTML = "Ingresar al Portal";
            }
        } catch (e) {
            showToast("Error de conexión", "error");
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
