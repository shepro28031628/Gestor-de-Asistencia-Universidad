{% extends "layout.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass-card p-10 animate-in">
        <div class="text-center mb-10">
            <!-- LOGO LOCAL SEGURO -->
            <img src="/static/img/logo.png" alt="UNINPAHU" class="h-24 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-3xl font-black text-[#002B49] tracking-tighter uppercase">Asistencia</h1>
            <p class="text-slate-500 font-bold text-[10px] tracking-[0.2em] uppercase mt-2">Plataforma Académica</p>
        </div>

        <div class="bg-slate-100 p-1.5 rounded-2xl mb-8 flex gap-1 border border-slate-200">
            <button onclick="setRole('estudiante')" id="btn-estudiante" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-[#002B49] transition-all">Estudiante</button>
            <button onclick="setRole('profesor')" id="btn-profesor" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-slate-400 hover:text-[#002B49] transition-all">Docente</button>
        </div>

        <div class="space-y-5">
            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-[#002B49] uppercase tracking-widest ml-1">Usuario Institucional</label>
                <input type="text" id="username" placeholder="Tu usuario o documento" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-[#002B49] outline-none font-bold text-[#002B49]">
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-[#002B49] uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" id="password" placeholder="••••" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-[#002B49] outline-none font-bold text-[#002B49]">
            </div>

            <button onclick="handleLogin()" class="w-full bg-[#002B49] text-white py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all mt-4 flex items-center justify-center gap-3">
                <span>INGRESAR AL PORTAL</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script>
let currentRole = 'estudiante';
function setRole(role) {
    currentRole = role;
    const btnEst = document.getElementById('btn-estudiante');
    const btnProf = document.getElementById('btn-profesor');
    const active = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-[#002B49] transition-all";
    const inactive = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-slate-400 hover:text-[#002B49] transition-all";
    btnEst.className = role === 'estudiante' ? active : inactive;
    btnProf.className = role === 'profesor' ? active : inactive;
}

async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) return showToast("Completa los datos", "warning");

    try {
        const response = await fetch('http://localhost:5001/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password, role: currentRole })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message);
        localStorage.setItem('user', JSON.stringify({username: data.username, name: data.full_name, role: data.role, id: data.user_id}));
        window.location.href = data.role === 'profesor' ? '/profesor' : '/estudiante';
    } catch (e) { showToast("Acceso denegado", "error"); }
}
</script>
{% endblock %}
