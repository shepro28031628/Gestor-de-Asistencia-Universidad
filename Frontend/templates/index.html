{% extends "layout.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass-card p-10 animate-in">
        <div class="text-center mb-10">
            <!-- LOGO INSTITUCIONAL RESTAURADO -->
            <img src="/static/img/logo.png" alt="UNINPAHU" class="h-24 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-3xl font-black text-[var(--orange-main)] tracking-tighter uppercase">Asistencia</h1>
            <p class="text-slate-500 font-bold text-[10px] tracking-[0.2em] uppercase mt-2">Plataforma Académica</p>
        </div>

        <div class="bg-[var(--orange-soft)] p-1.5 rounded-2xl mb-8 flex gap-1 border border-[var(--orange-border)]">
            <button onclick="setRole('estudiante')" id="btn-estudiante" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-[var(--orange-main)] transition-all">Estudiante</button>
            <button onclick="setRole('profesor')" id="btn-profesor" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-gray-400 hover:text-[var(--orange-main)] transition-all">Docente</button>
        </div>

        <div class="space-y-5">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-wider bg-white px-2 py-1 inline-block border-l-2 border-[var(--orange-main)]">NÚMERO DE DOCUMENTO</label>
                <input type="text" id="username" placeholder="Tu número de cédula o T.I." class="w-full bg-[var(--orange-soft)] border-2 border-[var(--orange-border)] rounded-2xl px-6 py-4 focus:border-[var(--orange-main)] focus:bg-white outline-none font-bold text-[var(--orange-main)] transition-all">
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-bold text-[var(--orange-main)] uppercase tracking-widest ml-1">Contraseña</label>
                <input type="password" id="password" placeholder="••••" class="w-full bg-[var(--orange-soft)] border-2 border-[var(--orange-border)] rounded-2xl px-6 py-4 focus:border-[var(--orange-main)] focus:bg-white outline-none font-bold text-[var(--orange-main)] transition-all">
            </div>

            <button onclick="handleLogin()" class="w-full btn-uninpahu-orange py-5 rounded-2xl font-black shadow-xl active:scale-95 transition-all mt-4 flex items-center justify-center gap-3">
                <span>INGRESAR AL PORTAL</span>
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script>
// Estado global del rol seleccionado (estudiante por defecto)
let currentRole = 'estudiante';

/**
 * Cambia visualmente los botones de rol y actualiza la variable de estado.
 */
function setRole(role) {
    currentRole = role;
    const btnEst = document.getElementById('btn-estudiante');
    const btnProf = document.getElementById('btn-profesor');
    const active = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl bg-white shadow-sm text-[var(--orange-main)] transition-all";
    const inactive = "flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-xl text-gray-400 hover:text-[var(--orange-main)] transition-all";
    
    // Aplicamos clases de estilo según el botón presionado
    btnEst.className = role === 'estudiante' ? active : inactive;
    btnProf.className = role === 'profesor' ? active : inactive;
}

/**
 * Captura datos del formulario y realiza la petición de autenticación a la API.
 */
async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    
    // Validación básica de campos vacíos
    if (!username || !password) return showToast("Completa los datos", "warning");

    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password, role: currentRole })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.message);
        
        // PERSISTENCIA: Guardamos los datos esenciales del usuario en LocalStorage para toda la sesión PWA
        localStorage.setItem('user', JSON.stringify({
            username: data.username, 
            name: data.full_name, 
            role: data.role, 
            id: data.user_id,
            profile_pic: data.profile_pic
        }));
        
        // Redirección según el rol devuelto por el servidor
        window.location.href = data.role === 'profesor' ? '/profesor' : '/estudiante';
        
    } catch (e) { 
        showToast("Acceso denegado. Verifica tus credenciales.", "error"); 
    }
}
</script>
{% endblock %}
