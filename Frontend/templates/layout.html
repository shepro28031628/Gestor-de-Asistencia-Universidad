<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UNINPAHU ASISTENCIA{% endblock %}</title>
    
    <!-- PWA & ICONO -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/webp" href="/static/img/Icono-1.webp">
    <meta name="theme-color" content="#FFCCBC">
    
    <!-- CSS & FONTS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    {% block content %}{% endblock %}

    <!-- TOAST NOTIFICATIONS -->
    <div id="toast-container" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[300] space-y-2"></div>

    <script>
        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = {
                'success': 'bg-emerald-500',
                'error': 'bg-red-500',
                'warning': 'bg-orange-500',
                'info': 'bg-blue-600'
            };
            toast.className = `${colors[type]} text-white px-8 py-4 rounded-2xl shadow-2xl font-black text-[10px] uppercase tracking-widest animate-in slide-in-from-bottom-4 duration-300 flex items-center gap-3`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // FEEDBACK SENSORIAL: Sonido y Vibración
        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
            navigator.vibrate && navigator.vibrate([100, 50, 100]);
        }

        // REGISTRO DE PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('PWA Lista para UNINPAHU (Scope Raíz)');
                });
            });
        }
    </script>
</body>
</html>
