{% extends "layout.html" %}



{% block content %}
<div class="max-w-xl mx-auto p-6 space-y-6 min-h-screen">
    
    <!-- HEADER -->
    <div class="text-center mb-8 animate-in fade-in duration-700">
        <div class="relative inline-block mb-4 group cursor-pointer" onclick="document.getElementById('profile-input').click()">
            <div id="user-avatar" class="w-24 h-24 bg-[var(--orange-main)] rounded-full mx-auto flex items-center justify-center border-4 border-white shadow-2xl transition-all group-hover:scale-105 overflow-hidden">
                <span id="user-initials" class="text-3xl font-black text-white">...</span>
                <img id="profile-img" class="hidden w-full h-full object-cover">
            </div>
            <div class="absolute bottom-0 right-0 bg-[#FF4D00] w-8 h-8 rounded-full border-4 border-white flex items-center justify-center shadow-lg">
                <i class="fas fa-camera text-white text-[10px]"></i>
            </div>
            <input type="file" id="profile-input" class="hidden" accept="image/*" onchange="uploadProfilePic(this)">
        </div>
        <h1 class="text-3xl font-black text-[var(--orange-700)] uppercase tracking-tighter" id="prof-name">Cargando...</h1>
        <p class="text-slate-500 font-bold text-[10px] tracking-widest uppercase">Gestión de Asistencia Universitaria</p>
        <button onclick="logout()" class="mt-4 text-[10px] font-black text-slate-400 hover:text-red-500 uppercase flex items-center justify-center gap-2 mx-auto transition-colors">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </div>

    <!-- NAVEGACIÓN MULTI-TAB COMPLETA -->
    <div class="flex gap-1 p-1 bg-slate-200/50 backdrop-blur-md rounded-2xl border border-white/20 overflow-x-auto no-scrollbar">
        <button onclick="switchTab('actual')" id="tab-actual" class="flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl bg-white shadow-sm text-[var(--orange-700)] transition-all whitespace-nowrap">Sesión Actual</button>
        <button onclick="switchTab('historial')" id="tab-historial" class="flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl text-slate-500 transition-all whitespace-nowrap">Historial</button>
        <button onclick="switchTab('alertas')" id="tab-alertas" class="flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl text-slate-500 transition-all whitespace-nowrap text-red-500">Alertas</button>
        <button onclick="switchTab('justificaciones')" id="tab-justificaciones" class="flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl text-slate-500 transition-all whitespace-nowrap">Justificaciones</button>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div id="tab-content" class="pb-20">
        
        <!-- PESTAÑA: SESIÓN ACTUAL -->
        <div id="content-actual" class="tab-pane animate-in slide-in-from-bottom-4">
            <div class="glass-card p-10 text-center">
                <div class="mb-8">
                    <label class="text-[10px] font-black text-[var(--orange-700)] uppercase block mb-3">Materia para Activar</label>
                    <select id="subject-selector" class="w-full bg-white border-2 border-slate-100 rounded-2xl px-6 py-4 font-bold outline-none focus:border-[#FF4D00] shadow-sm"></select>
                </div>
                <div id="qr-container" class="hidden mb-8 animate-in zoom-in">
                    <div class="bg-white p-6 inline-block rounded-[2.5rem] shadow-2xl border-4 border-slate-50">
                        <div id="qrcode"></div>
                    </div>
                    <p class="mt-6 text-[10px] font-black text-emerald-500 uppercase animate-pulse">QR Activo para Estudiantes</p>
                </div>
                <button onclick="activar()" id="btn-activar" class="w-full bg-[#FF4D00] text-white py-5 rounded-2xl font-black shadow-xl uppercase text-xs tracking-widest active:scale-95 transition-all">
                    Activar Plataforma
                </button>
                <div id="real-time-panel" class="hidden mt-10 text-left border-t border-slate-100 pt-8">
                    <h3 class="text-[10px] font-black text-[var(--orange-700)] uppercase tracking-widest mb-6 flex justify-between items-center">
                        Asistencia en Vivo <span id="counter" class="bg-[var(--orange-main)] text-white px-3 py-1 rounded-full text-[8px]">0/0</span>
                    </h3>
                    <div id="live-student-list" class="space-y-2 mb-8"></div>
                    
                    <!-- Botón para escanear a estudiantes -->
                    <button onclick="startProfScanner()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase text-[9px] tracking-[0.2em] hover:bg-blue-700 transition-all mb-4 flex items-center justify-center">
                        <i class="fas fa-camera mr-2"></i> Escanear QR Alumnos
                    </button>
                    
                    <button onclick="finalizar()" class="w-full bg-[var(--orange-main)] text-white py-4 rounded-2xl font-black shadow-lg uppercase text-[9px] tracking-[0.2em] hover:bg-slate-800 transition-all flex items-center justify-center">
                        <i class="fas fa-file-export mr-2"></i> Finalizar y Enviar Reporte
                    </button>
                </div>
            </div>
        </div>

        <!-- PESTAÑA: HISTORIAL -->
        <div id="content-historial" class="tab-pane hidden animate-in slide-in-from-bottom-4">
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- PESTAÑA: ALERTAS -->
        <div id="content-alertas" class="tab-pane hidden animate-in slide-in-from-bottom-4">
            <div class="glass-card p-6 border-l-4 border-red-500">
                <h4 class="text-sm font-black text-red-600 uppercase mb-4">Riesgo de Deserción</h4>
                <div id="alerts-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- PESTAÑA: JUSTIFICACIONES -->
        <div id="content-justificaciones" class="tab-pane hidden animate-in slide-in-from-bottom-4">
            <div class="glass-card p-6 border-l-4 border-blue-500">
                <h4 class="text-sm font-black text-[var(--orange-700)] uppercase mb-4">Revision de Excusas</h4>
                <div id="excuses-list" class="space-y-3">
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center">
                        <div>
                            <p class="font-black text-[10px] text-blue-700 uppercase">JUAN PEREZ</p>
                            <p class="text-[8px] font-bold text-blue-400 uppercase">Excusa Médica - 29/04/2026</p>
                        </div>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase shadow-lg">VER DOC</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

    </div>
</div>

<!-- MODAL LISTADO DE ASISTENTES (HISTORIAL) -->
<div id="history-modal" class="fixed inset-0 z-[200] hidden flex flex-col items-center justify-center p-6 transition-all duration-300">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeHistoryModal()"></div>
    <div class="glass-card relative w-full max-w-sm z-10 p-8 shadow-2xl animate-in zoom-in-90 flex flex-col">
        <h2 class="text-[var(--orange-700)] text-center text-sm font-black uppercase mb-1" id="history-modal-title">Asistentes</h2>
        <p class="text-[9px] font-bold text-slate-400 uppercase text-center mb-6" id="history-modal-date"></p>
        
        <div id="history-modal-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
            <!-- Cargado dinámicamente -->
        </div>

        <button onclick="closeHistoryModal()" class="w-full mt-6 bg-[var(--orange-main)] text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg">Cerrar</button>
    </div>
</div>

<style>
    #prof-reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script>
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = '/';
document.getElementById('prof-name').innerText = user.full_name || user.name;

const nameParts = (user.full_name || user.name).split(' ');
const initials = nameParts.map(n => n[0]).join('').substring(0,2).toUpperCase();
document.getElementById('user-initials').innerText = initials;

// CARGAR FOTO SI EXISTE
if (user.profile_pic) {
    const img = document.getElementById('profile-img');
    img.src = `${user.profile_pic}`;
    img.classList.remove('hidden');
    document.getElementById('user-initials').classList.add('hidden');
}

async function uploadProfilePic(input) {
    if (!input.files[0]) return;
    const formData = new FormData();
    formData.append('file', input.files[0]);
    formData.append('user_id', user.user_id || user.id);

    try {
        const resp = await fetch('/api/auth/update-profile-pic', {
            method: 'POST',
            body: formData
        });
        const data = await resp.json();
        if (data.success) {
            user.profile_pic = data.profile_pic;
            localStorage.setItem('user', JSON.stringify(user));
            location.reload();
        }
    } catch (e) { showToast("Error al subir foto", "error"); }
}

let activeScheduleId = null;
let pollInterval = null;
let currentSessionStudents = []; // Almacena los alumnos para el escaneo en vivo
let html5ProfQrCode = null;
let lastScannedData = null;

async function init() { await loadHorario(); }

/**
 * Carga las materias que el profesor dicta hoy.
 */
async function loadHorario() {
    try {
        const resp = await fetch(`/api/attendance/horario/${user.username}`);
        const data = await resp.json();
        const day = ['U', 'M', 'T', 'W', 'R', 'F', 'S'][new Date().getDay()];
        const hoy = data.filter(m => m.day === day);
        document.getElementById('subject-selector').innerHTML = hoy.length ? hoy.map(m => `<option value="${m.schedule_id}">${m.materia}</option>`).join('') : '<option value="">Sin clases hoy</option>';
    } catch (e) {}
}

/**
 * Activa la sesión de clase, genera el QR inicial y comienza el monitoreo en vivo.
 */
async function activar() {
    const sid = document.getElementById('subject-selector').value;
    if(!sid) return showToast("Selecciona materia", "warning");
    activeScheduleId = sid;
    try {
        const resp = await fetch('/api/attendance/activar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ schedule_id: sid })
        });
        const data = await resp.json();
        
        // Cambio de UI para mostrar el QR y la lista de asistencia
        document.getElementById('qr-container').classList.remove('hidden');
        document.getElementById('btn-activar').classList.add('hidden');
        document.getElementById('real-time-panel').classList.remove('hidden');
        
        // Generación física del QR
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById('qrcode'), { text: data.token, width: 200, height: 200 });
        
        startPolling(); // Inicia el ciclo de actualización
        showToast("🚀 Sesión Activa", "success");
    } catch (e) { }
}

/**
 * Finaliza la clase manualmente y dispara el envío del reporte por email.
 */
async function finalizar() {
    if (!confirm("¿Deseas cerrar la asistencia y enviar el reporte por correo?")) return;
    try {
        const resp = await fetch('/api/attendance/finalizar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ schedule_id: activeScheduleId })
        });
        const d = await resp.json();
        if (d.success) {
            showToast(d.message, "success");
            // Limpieza de estados y retorno a la vista inicial
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('qr-container').classList.add('hidden');
            document.getElementById('real-time-panel').classList.add('hidden');
            document.getElementById('btn-activar').classList.remove('hidden');
            activeScheduleId = null;
        }
    } catch (e) { showToast("Error al finalizar", "error"); }
}


function startPolling() {
    if (pollInterval) clearInterval(pollInterval);
    updateLiveList();
    pollInterval = setInterval(() => {
        updateLiveList();
        updateQRCode(); // Rotación de seguridad
    }, 3000); 
}

async function updateQRCode() {
    if (!activeScheduleId) return;
    try {
        const resp = await fetch(`/api/attendance/token-vivo/${activeScheduleId}`);
        const data = await resp.json();
        const qrContainer = document.getElementById('qrcode');
        // Solo regeneramos si el token cambió para evitar parpadeos innecesarios
        if (qrContainer.getAttribute('data-token') !== data.token) {
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: data.token, width: 200, height: 200 });
            qrContainer.setAttribute('data-token', data.token);
        }
    } catch (e) {}
}

/**
 * Recupera la lista de todos los estudiantes inscritos y resalta los presentes.
 */
async function updateLiveList() {
    if (!activeScheduleId) return;
    try {
        const resp = await fetch(`/api/attendance/estudiantes-sesion/${activeScheduleId}`);
        const students = await resp.json();
        currentSessionStudents = students; // Guardamos para la validación del escáner inverso
        const present = students.filter(s => s.asistio > 0).length;
        
        // Animación visual del contador
        const counterEl = document.getElementById('counter');
        if (counterEl.innerText !== `${present}/${students.length}`) {
            counterEl.classList.add('scale-125', 'bg-emerald-500');
            setTimeout(() => counterEl.classList.remove('scale-125', 'bg-emerald-500'), 1000);
        }
        counterEl.innerText = `${present}/${students.length}`;
        
        // Renderizado de tarjetas de estudiantes
        document.getElementById('live-student-list').innerHTML = students.map(s => `
            <div class="flex items-center justify-between p-3 rounded-xl ${s.asistio ? 'bg-emerald-50 border border-emerald-100 animate-in fade-in zoom-in-95' : 'bg-slate-50'} transition-all duration-500">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black ${s.asistio ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400'}">
                        ${s.asistio ? '✓' : s.full_name[0]}
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-[var(--orange-700)] uppercase leading-none">${s.full_name}</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1">${s.username}</p>
                    </div>
                </div>
                ${!s.asistio ? `
                    <button onclick="marcarManual(${s.id})" class="text-[8px] font-black bg-blue-500 text-white px-3 py-2 rounded-lg hover:bg-blue-600 transition-colors uppercase shadow-sm">Marcar</button>
                ` : `
                    <span class="text-[8px] font-black text-emerald-600 uppercase animate-pulse">Presente</span>
                `}
            </div>
        `).join('');
    } catch (e) {}
}

/**
 * Permite al profesor marcar a un estudiante que no pudo escanear el QR.
 */
async function marcarManual(studentId) {
    try {
        const resp = await fetch('/api/attendance/marcar-manual', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ student_id: studentId, schedule_id: activeScheduleId })
        });
        const d = await resp.json();
        if (d.success) { showToast("Marcado manual exitoso", "success"); updateLiveList(); }
    } catch (e) {}
}

/**
 * Inicia la cámara del profesor para escanear QR de estudiantes.
 */
async function startProfScanner() {
    document.getElementById('prof-scanner-modal').classList.remove('hidden');
    html5ProfQrCode = new Html5Qrcode("prof-reader");
    lastScannedData = null;
    
    const statusEl = document.getElementById('scanner-status');
    statusEl.innerText = "Pase el QR del estudiante";
    statusEl.className = "text-[10px] font-bold text-slate-500 uppercase text-center mb-6";
    
    try {
        await html5ProfQrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 }, 
            (decodedText) => processProfScan(decodedText)
        );
    } catch (err) { stopProfScanner(); showToast("Error al abrir cámara", "error"); }
}

/**
 * Detiene el escáner del profesor.
 */
async function stopProfScanner() {
    if (html5ProfQrCode) { 
        try { await html5ProfQrCode.stop(); } catch(e){} 
        html5ProfQrCode = null; 
    }
    document.getElementById('prof-scanner-modal').classList.add('hidden');
}

/**
 * Procesa la lectura continua del QR del estudiante.
 */
async function processProfScan(qrData) {
    if (qrData === lastScannedData) return; // Evitar spam del mismo QR
    lastScannedData = qrData;
    
    const student = currentSessionStudents.find(s => s.username === qrData || s.id.toString() === qrData);
    const statusEl = document.getElementById('scanner-status');
    
    if (student) {
        if (student.asistio) {
            statusEl.innerText = `¡${student.full_name} ya está presente!`;
            statusEl.className = "text-[10px] font-bold text-blue-500 uppercase text-center mb-6";
            navigator.vibrate && navigator.vibrate(50); // Pequeña vibración de feedback
        } else {
            statusEl.innerText = `Marcando a ${student.full_name}...`;
            statusEl.className = "text-[10px] font-bold text-emerald-500 uppercase text-center mb-6 animate-pulse";
            await marcarManual(student.id);
            statusEl.innerText = `¡${student.full_name} marcado! Pase al siguiente.`;
            statusEl.className = "text-[10px] font-bold text-emerald-600 uppercase text-center mb-6";
            navigator.vibrate && navigator.vibrate([100, 50, 100]); // Vibración doble de éxito
        }
    } else {
        statusEl.innerText = "QR no reconocido o alumno no inscrito";
        statusEl.className = "text-[10px] font-bold text-red-500 uppercase text-center mb-6";
        navigator.vibrate && navigator.vibrate(300); // Vibración larga de error
    }
    
    setTimeout(() => { if (lastScannedData === qrData) lastScannedData = null; }, 3000);
}

async function loadJustificaciones() {
    try {
        const resp = await fetch('/api/attendance/get-justificaciones-docente');
        const data = await resp.json();
        document.getElementById('excuses-list').innerHTML = data.length ? data.map(j => `
            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center animate-in slide-in-from-right">
                <div>
                    <p class="font-black text-[10px] text-blue-700 uppercase">${j.student_name}</p>
                    <p class="text-[8px] font-bold text-blue-400 uppercase">${j.materia} - ${j.timestamp.split(' ')[0]}</p>
                </div>
                <a href="${j.file_path}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[8px] font-black uppercase shadow-lg hover:bg-blue-700 transition-all">VER DOC</a>
            </div>
        `).join('') : '<div class="text-center py-10 text-slate-400 font-bold uppercase text-[10px]">No hay justificaciones pendientes</div>';
    } catch (e) {}
}

function switchTab(tab) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
    document.getElementById(`content-${tab}`).classList.remove('hidden');
    document.querySelectorAll('button[id^="tab-"]').forEach(b => b.className = "flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl text-slate-500 transition-all whitespace-nowrap");
    document.getElementById(`tab-${tab}`).className = "flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-xl bg-white shadow-sm text-[var(--orange-700)] transition-all whitespace-nowrap";
    if (tab === 'historial') loadHistorial();
    if (tab === 'alertas') loadAlertas();
    if (tab === 'justificaciones') loadJustificaciones();
}

async function loadHistorial() {
    try {
        const resp = await fetch(`/api/attendance/historial-docente/${user.username}`);
        const data = await resp.json();
        document.getElementById('history-list').innerHTML = data.length ? data.map(h => {
            const perc = (h.presentes / h.inscritos) * 100 || 0;
            return `
            <div class="glass-card p-6 animate-in slide-in-from-right cursor-pointer hover:scale-[1.01] transition-all" onclick="viewSessionDetails(${h.id}, '${h.materia}', '${h.fecha}')">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="font-black text-sm text-[var(--orange-700)] uppercase tracking-tighter">${h.materia}</p>
                        <p class="text-[8px] font-bold text-slate-400 uppercase"><i class="fas fa-calendar mr-1"></i> ${h.fecha.split(' ')[0]}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-black text-[#FF4D00]">${h.presentes}/${h.inscritos}</span>
                        <p class="text-[8px] font-black text-slate-300 uppercase">Asistieron</p>
                    </div>
                </div>
                <div class="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-[#FF4D00]" style="width: ${perc}%"></div>
                </div>
                <p class="text-[7px] font-black text-slate-400 uppercase mt-4 text-center tracking-widest">Click para ver listado</p>
            </div>
        `; }).join('') : '<div class="text-center py-20 text-slate-400 font-bold uppercase text-[10px]">No has activado sesiones aún</div>';
    } catch (e) { }
}

async function crearCitacion(studentId) {
    try {
        const resp = await fetch('/api/attendance/crear-citacion', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ teacher_id: user.user_id || user.id, student_id: studentId })
        });
        const d = await resp.json();
        showToast("📣 Estudiante citado formalmente", "success");
    } catch (e) { showToast("Error al citar", "error"); }
}

async function loadAlertas() {
    try {
        const resp = await fetch(`/api/attendance/riesgo-docente/${user.username}`);
        const data = await resp.json();
        const container = document.getElementById('alerts-list');
        
        if (!data.length) {
            container.innerHTML = `<div class="text-center py-10 text-slate-400 font-bold uppercase text-[10px]">No hay estudiantes en riesgo crítico</div>`;
            return;
        }

        container.innerHTML = data.map(a => `
            <div class="bg-red-50 p-6 rounded-3xl flex justify-between items-center border border-red-100 animate-in slide-in-from-right">
                <div>
                    <p class="font-black text-xs text-red-700 uppercase">${a.student_name}</p>
                    <p class="text-[8px] font-bold text-red-400 uppercase">${a.porcentaje}% ASISTENCIA (${a.materia})</p>
                </div>
                <button onclick="crearCitacion(${a.student_id})" class="bg-red-600 text-white px-6 py-3 rounded-2xl text-[8px] font-black uppercase shadow-lg active:scale-95 transition-all">CITAR</button>
            </div>
        `).join('');
    } catch (e) {
        document.getElementById('alerts-list').innerHTML = `<div class="text-center py-10 text-red-400 font-bold uppercase text-[10px]">Error al cargar alertas</div>`;
    }
}

async function viewSessionDetails(sessionId, materia, fecha) {
    document.getElementById('history-modal-title').innerText = materia;
    document.getElementById('history-modal-date').innerText = fecha;
    document.getElementById('history-modal-list').innerHTML = '<p class="text-center py-4 text-[10px] font-bold text-slate-400 uppercase animate-pulse">Cargando...</p>';
    document.getElementById('history-modal').classList.remove('hidden');

    try {
        const resp = await fetch(`/api/attendance/asistentes-sesion/${sessionId}`);
        const data = await resp.json();
        
        document.getElementById('history-modal-list').innerHTML = data.length ? data.map(a => `
            <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                <div class="flex flex-col">
                    <span class="text-[9px] font-black text-[var(--orange-700)] uppercase">${a.full_name}</span>
                    <span class="text-[7px] font-bold text-slate-400 uppercase">${a.username}</span>
                </div>
                <span class="text-[7px] font-black text-emerald-500 uppercase">${a.timestamp.split(' ')[1]}</span>
            </div>
        `).join('') : '<p class="text-center py-10 text-[9px] font-bold text-slate-300 uppercase">Nadie asistió a esta clase</p>';
    } catch (e) {
        document.getElementById('history-modal-list').innerHTML = '<p class="text-center py-10 text-red-500 text-[9px] font-bold uppercase">Error al cargar datos</p>';
    }
}

function closeHistoryModal() {
    document.getElementById('history-modal').classList.add('hidden');
}

function logout() { localStorage.clear(); window.location.href = '/logout'; }
init();
</script>
{% endblock %}
